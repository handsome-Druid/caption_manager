name: Release

on:
  push:
    branches:
      - master

permissions:
  contents: write
  attestations: write
  id-token: write
  packages: write

jobs:
  release:
    if: startsWith(github.event.head_commit.message, 'v')
    runs-on: ubuntu-latest
    steps:
      # 1. 检出默认分支（master），需要完整历史以便机器人提交并推送版本号
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. 从提交信息首行解析版本号（格式必须为 vX.Y.Z）
      - name: Resolve version from commit message
        id: version
        run: |
          RAW_MSG='${{ github.event.head_commit.message }}'
          TAG="$(printf '%s' "$RAW_MSG" | head -n1 | tr -d '\r')"

          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "提交信息首行必须是 vX.Y.Z，当前为: $TAG"
            exit 1
          fi

          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Tag=${TAG} Version=${VERSION}"

      # 3. 用 tag 版本替换 pyproject.toml 中的 version
      - name: Bump version in pyproject.toml
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i -E "0,/^version = \".*\"/s//version = \"${VERSION}\"/" pyproject.toml
          grep -E '^version = ' pyproject.toml

      # 3b. 同步更新 caption-manager Dockerfile 拉取的 tag，使发布的镜像构建脚本指向本次版本
      - name: Bump branch in caption-manager Dockerfile
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          sed -i -E "s#(--branch )\S+#\1${TAG}#" docker/caption-manager/Dockerfile
          grep -E -- '--branch' docker/caption-manager/Dockerfile

      # 3c. 同步更新 caption-manager NOTICE.md 中记录的构建版本
      - name: Bump version in caption-manager NOTICE.md
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          sed -i -E "s#(- 构建版本：\`)[^\`]+(\`)#\1${TAG}\2#" docker/caption-manager/NOTICE.md
          grep -E -- '- 构建版本：' docker/caption-manager/NOTICE.md

      # 3d. 同步更新 docker-compose 中三个服务镜像版本
      - name: Bump image tags in docker-compose.yml
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i -E "s#(^\s*image:\s*ghcr\.io/handsome-druid/anima-trainer:).*#\1${VERSION}#" docker/docker-compose.yml
          sed -i -E "s#(^\s*image:\s*ghcr\.io/handsome-druid/caption_manager:).*#\1${VERSION}#" docker/docker-compose.yml
          sed -i -E "s#(^\s*image:\s*ghcr\.io/handsome-druid/wd-llm-caption:).*#\1${VERSION}#" docker/docker-compose.yml
          grep -E '^\s*image:\s*ghcr\.io/handsome-druid/' docker/docker-compose.yml

      # 4. 通过 GitHub API 在服务端提交版本变更到 master
      - name: Commit version bump via GitHub API
        id: commit
        uses: actions/github-script@v7
        env:
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        with:
          script: |
            const fs = require("node:fs");

            const branchName = "master";
            const files = [
              "pyproject.toml",
              "docker/caption-manager/Dockerfile",
              "docker/caption-manager/NOTICE.md",
              "docker/docker-compose.yml",
            ];

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const repoFullName = `${owner}/${repo}`;

            const { data: branchRef } = await github.rest.git.getRef({
              owner,
              repo,
              ref: `heads/${branchName}`,
            });
            const headSha = branchRef.object.sha;

            const additions = [];
            for (const path of files) {
              const localContent = fs.readFileSync(path, "utf8");
              const { data: remoteFile } = await github.rest.repos.getContent({
                owner,
                repo,
                path,
                ref: branchName,
              });

              if (Array.isArray(remoteFile)) {
                core.setFailed(`目标路径不是文件: ${path}`);
                return;
              }

              const remoteContent = Buffer.from(remoteFile.content, remoteFile.encoding).toString("utf8");
              if (remoteContent !== localContent) {
                const contents = Buffer.from(localContent, "utf8").toString("base64");
                additions.push({ path, contents });
              }
            }

            if (additions.length === 0) {
              core.info("版本文件未变化，跳过提交。");
              core.setOutput("release_commit_oid", headSha);
              return;
            }

            const result = await github.graphql(
              `
                mutation($input: CreateCommitOnBranchInput!) {
                  createCommitOnBranch(input: $input) {
                    commit {
                      oid
                      url
                    }
                  }
                }
              `,
              {
                input: {
                  branch: {
                    repositoryNameWithOwner: repoFullName,
                    branchName,
                  },
                  message: {
                    headline: `chore: release ${process.env.RELEASE_TAG}`,
                  },
                  fileChanges: {
                    additions,
                  },
                  expectedHeadOid: headSha,
                },
              },
            );

            core.info(`Created commit: ${result.createCommitOnBranch.commit.url}`);
            core.setOutput("release_commit_oid", result.createCommitOnBranch.commit.oid);

      # 4b. 用版本号创建/更新 tag，并指向版本提交
      - name: Upsert release tag
        uses: actions/github-script@v7
        env:
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
          RELEASE_COMMIT_OID: ${{ steps.commit.outputs.release_commit_oid }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag = process.env.RELEASE_TAG;
            const commitOid = process.env.RELEASE_COMMIT_OID;
            const ref = `tags/${tag}`;

            try {
              const { data: currentRef } = await github.rest.git.getRef({ owner, repo, ref });
              if (currentRef.object.sha !== commitOid) {
                core.setFailed(`Tag ${tag} 已存在且指向 ${currentRef.object.sha}，拒绝改写为 ${commitOid}`);
                return;
              }
              core.info(`Tag ${tag} 已存在且目标一致，跳过。`);
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
              await github.rest.git.createRef({
                owner,
                repo,
                ref: `refs/tags/${tag}`,
                sha: commitOid,
              });
              core.info(`Created tag ${tag} -> ${commitOid}`);
            }

      # 5. 构建并上传三个 Docker 镜像到 GHCR
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push caption-manager image
        id: build_caption_manager
        uses: docker/build-push-action@v6
        with:
          context: docker/caption-manager
          file: docker/caption-manager/Dockerfile
          push: true
          tags: |
            ghcr.io/handsome-druid/caption_manager:${{ steps.version.outputs.version }}
            ghcr.io/handsome-druid/caption_manager:latest
          cache-from: |
            type=gha,scope=shared-cuda-base
            type=gha,scope=caption-manager
          cache-to: |
            type=gha,mode=max,scope=shared-cuda-base
            type=gha,mode=max,scope=caption-manager

      - name: Build and push anima-trainer image
        id: build_anima_trainer
        uses: docker/build-push-action@v6
        with:
          context: docker/anima-trainer
          file: docker/anima-trainer/Dockerfile
          push: true
          tags: |
            ghcr.io/handsome-druid/anima-trainer:${{ steps.version.outputs.version }}
            ghcr.io/handsome-druid/anima-trainer:latest
          cache-from: |
            type=gha,scope=shared-cuda-base
            type=gha,scope=anima-trainer
          cache-to: |
            type=gha,mode=max,scope=shared-cuda-base
            type=gha,mode=max,scope=anima-trainer

      - name: Build and push wd-llm-caption image
        id: build_wd_llm_caption
        uses: docker/build-push-action@v6
        with:
          context: docker/wd-llm-caption-cli
          file: docker/wd-llm-caption-cli/Dockerfile
          push: true
          tags: |
            ghcr.io/handsome-druid/wd-llm-caption:${{ steps.version.outputs.version }}
            ghcr.io/handsome-druid/wd-llm-caption:latest
          cache-from: |
            type=gha,scope=shared-cuda-base
            type=gha,scope=wd-llm-caption
          cache-to: |
            type=gha,mode=max,scope=shared-cuda-base
            type=gha,mode=max,scope=wd-llm-caption

      - name: Attest build provenance for caption-manager image
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/handsome-druid/caption_manager
          subject-digest: ${{ steps.build_caption_manager.outputs.digest }}
          push-to-registry: true

      - name: Attest build provenance for anima-trainer image
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/handsome-druid/anima-trainer
          subject-digest: ${{ steps.build_anima_trainer.outputs.digest }}
          push-to-registry: true

      - name: Attest build provenance for wd-llm-caption image
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/handsome-druid/wd-llm-caption
          subject-digest: ${{ steps.build_wd_llm_caption.outputs.digest }}
          push-to-registry: true

      # 5b. 为三个镜像生成 SBOM（SPDX JSON）
      - name: Generate SBOM for caption-manager image
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/handsome-druid/caption_manager:${{ steps.version.outputs.version }}
          format: spdx-json
          output-file: sbom-caption-manager.spdx.json

      - name: Generate SBOM for anima-trainer image
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/handsome-druid/anima-trainer:${{ steps.version.outputs.version }}
          format: spdx-json
          output-file: sbom-anima-trainer.spdx.json

      - name: Generate SBOM for wd-llm-caption image
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/handsome-druid/wd-llm-caption:${{ steps.version.outputs.version }}
          format: spdx-json
          output-file: sbom-wd-llm-caption.spdx.json

      # 6. 打包 docker 文件夹
      - name: Archive docker folder
        run: zip -r docker.zip docker

      # 6b. 为发布资产生成 build provenance attestation
      - name: Attest build provenance for docker.zip
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: docker.zip

      # 7. 发布 Release 并附带 docker.zip
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          files: |
            docker.zip
            sbom-caption-manager.spdx.json
            sbom-anima-trainer.spdx.json
            sbom-wd-llm-caption.spdx.json
          generate_release_notes: true
