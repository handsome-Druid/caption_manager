services:
  anima-trainer:
    build:
      context: ./anima-trainer
      dockerfile: Dockerfile
    image: ghcr.io/handsome-druid/anima-trainer:latest
    container_name: anima-trainer
    ports:
      - "13000:3000"
    volumes:
      - ./anima-trainer/models:/anima-trainer/models
      - ./datasets:/datasets
      - ./anima-trainer/jobs:/anima-trainer/training-ui/jobs
      - ./anima-trainer/config:/anima-trainer/config
      - ./anima-trainer/hf-cache:/root/.cache/huggingface
      - /etc/localtime:/etc/localtime:ro
    environment:
      - HF_HOME=/root/.cache/huggingface
    networks:
      - anima-net
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  caption-manager:
    build:
      context: ./caption-manager
      dockerfile: Dockerfile
    image: ghcr.io/handsome-druid/caption_manager:0.3.6
    container_name: caption-manager
    ports:
      - "1357:1357"
    environment:
      - CAPTION_MANAGER_HOST=0.0.0.0
    volumes:
      - ./datasets:/caption_manager/datasets
      - ./caption-manager/filtering_tags:/caption_manager/filtering_tags
      - /etc/localtime:/etc/localtime:ro
    networks:
      - anima-net
    restart: unless-stopped

  wd-llm-caption:
    build:
      context: ./wd-llm-caption-cli
      dockerfile: Dockerfile
    image: ghcr.io/handsome-druid/wd-llm-caption:latest
    container_name: wd-llm-caption
    ports:
      - "8282:8282"
    environment:
      HF_TOKEN: ${HF_TOKEN:-}
      HF_HOME: /wd-llm-caption-cli/cache/huggingface
      TRANSFORMERS_CACHE: /wd-llm-caption-cli/cache/huggingface
      MODELSCOPE_CACHE: /wd-llm-caption-cli/cache/modelscope
    volumes:
      - ./wd-llm-caption-cli/models:/wd-llm-caption-cli/models
      - ./wd-llm-caption-cli/cache:/wd-llm-caption-cli/cache
      - ./datasets:/datasets
      - /etc/localtime:/etc/localtime:ro
    networks:
      - anima-net
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

networks:
  anima-net:
    driver: bridge

